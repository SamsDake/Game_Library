# Nginx site template for the VPS Game Library.
# Replace example.com and /var/www/minigame-library before enabling.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name example.com;

    root "/var/www/minigame-library/lobby";
    index index.html;

    location = /urban-hunt {
        return 301 /urban-hunt/;
    }

    location = /jetlag {
        return 301 /jetlag/;
    }

    location = /deduction-board {
        return 301 /deduction-board/;
    }

    # Static lobby.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Urban Hunt is served by its Express process. The trailing slash strips
    # /urban-hunt/ before proxying, so /urban-hunt/api maps to /api upstream.
    location /urban-hunt/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Jetlag Mobile static app.
    location /jetlag/ {
        alias "/var/www/minigame-library/Jetlag Mobile App/dist/";
        try_files $uri $uri/ /jetlag/index.html;
    }

    location = /jetlag/sw.js {
        alias "/var/www/minigame-library/Jetlag Mobile App/dist/sw.js";
        add_header Cache-Control "no-cache";
    }

    # Jetlag Mobile HTTP push endpoints. /jetlag-api/vapid-public-key maps to
    # /vapid-public-key upstream.
    location /jetlag-api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Jetlag Mobile WebSocket sync.
    location /jetlag-ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Deduction Board static app.
    location /deduction-board/ {
        alias "/var/www/minigame-library/jetlag-deduction-board/dist/";
        try_files $uri $uri/ /deduction-board/index.html;
    }

    # Deduction Board room sync. /deduction-sync/room/ABC maps to /room/ABC.
    location /deduction-sync/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
