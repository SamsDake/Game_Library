# Nginx site for the Jet Lag app.
# Copy to /etc/nginx/sites-available/jetlag and symlink into sites-enabled,
# then run `sudo certbot --nginx -d comicsams.cloud` to add the 443 server + redirect.
server {
    listen 80;
    server_name comicsams.cloud;

    root /var/www/jetlag/dist;
    index index.html;

    # SPA fallback
    location / { try_files $uri /index.html; }

    # Service worker must not be cached stale
    location = /sw.js { add_header Cache-Control "no-cache"; try_files $uri =404; }

    # Push endpoints -> Node server
    location = /vapid-public-key { proxy_pass http://127.0.0.1:8080; }
    location = /push-subscribe   { proxy_pass http://127.0.0.1:8080; }
    location = /push-test        { proxy_pass http://127.0.0.1:8080; }
    location /jetlag-api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # WebSocket sync -> Node server (with upgrade)
    location /jetlag-ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
