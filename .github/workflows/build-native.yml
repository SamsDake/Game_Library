name: Build Native Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build web client
        working-directory: Urban Hunt
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.URBAN_HUNT_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          npm install
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            VITE_NATIVE_PUSH_ENABLED=true VITE_API_BASE_URL=https://comicsams.cloud/urban-hunt npm run build
          else
            VITE_NATIVE_PUSH_ENABLED=false VITE_API_BASE_URL=https://comicsams.cloud/urban-hunt npm run build
          fi

      - name: Add Firebase Android config
        working-directory: Urban Hunt
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.URBAN_HUNT_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
          else
            echo "URBAN_HUNT_GOOGLE_SERVICES_JSON_BASE64 not set; Android native push will not work."
          fi

      - name: Sync Capacitor to Android
        working-directory: Urban Hunt
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Make gradlew executable
        working-directory: Urban Hunt/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: Urban Hunt/android
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: urban-hunt-android
          path: Urban Hunt/android/app/build/outputs/apk/debug/app-debug.apk

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build web client
        working-directory: Urban Hunt
        run: |
          npm install
          VITE_NATIVE_PUSH_ENABLED=true VITE_API_BASE_URL=https://comicsams.cloud/urban-hunt npm run build

      - name: Sync Capacitor to iOS
        working-directory: Urban Hunt
        run: npx cap sync ios

      - name: Ensure location permissions in Info.plist
        working-directory: Urban Hunt
        run: |
          python3 -c "
          import plistlib
          path = 'ios/App/App/Info.plist'
          with open(path, 'rb') as f:
              plist = plistlib.load(f)
          plist['NSLocationWhenInUseUsageDescription'] = 'Urban Hunt uses your location so seekers and hiders can play the active game.'
          plist['NSLocationAlwaysAndWhenInUseUsageDescription'] = 'Urban Hunt uses your location while the app is backgrounded or the device is locked during an active game.'
          modes = plist.get('UIBackgroundModes', [])
          if 'location' not in modes:
              modes.append('location')
          plist['UIBackgroundModes'] = modes
          with open(path, 'wb') as f:
              plistlib.dump(plist, f)
          print('NSLocationWhenInUseUsageDescription:', plist.get('NSLocationWhenInUseUsageDescription'))
          print('NSLocationAlwaysAndWhenInUseUsageDescription:', plist.get('NSLocationAlwaysAndWhenInUseUsageDescription'))
          print('UIBackgroundModes:', plist.get('UIBackgroundModes'))
          "

      - name: Build unsigned app
        working-directory: Urban Hunt
        run: |
          set -o pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -target App \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$(pwd)/build" \
            CODE_SIGN_ENTITLEMENTS=App/App.entitlements \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee xcodebuild.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: Urban Hunt/xcodebuild.log

      - name: Package as IPA
        working-directory: Urban Hunt
        run: |
          mkdir Payload
          cp -r build/Release-iphoneos/App.app Payload/
          zip -r UrbanHunt.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: urban-hunt-ios
          path: Urban Hunt/UrbanHunt.ipa

  jetlag-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps and build web client
        working-directory: Jetlag Mobile App
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.JETLAG_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          npm install
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            VITE_NATIVE_PUSH_ENABLED=true \
            VITE_SERVER_URL=https://comicsams.cloud/jetlag-api \
            VITE_WS_URL=wss://comicsams.cloud/jetlag-ws \
            npm run build
          else
            VITE_NATIVE_PUSH_ENABLED=false \
            VITE_SERVER_URL=https://comicsams.cloud/jetlag-api \
            VITE_WS_URL=wss://comicsams.cloud/jetlag-ws \
            npm run build
          fi

      - name: Add and sync Android platform
        working-directory: Jetlag Mobile App
        run: npx cap add android

      - name: Add Firebase Android config
        working-directory: Jetlag Mobile App
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.JETLAG_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
          else
            echo "JETLAG_GOOGLE_SERVICES_JSON_BASE64 not set; Android native push will not work."
          fi

      - name: Sync Capacitor to Android
        working-directory: Jetlag Mobile App
        run: npx cap sync android

      - name: Add location permissions to AndroidManifest
        working-directory: Jetlag Mobile App
        run: |
          python3 -c "
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path) as f:
              content = f.read()
          perms = '    <uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />\n    <uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\" />\n    <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />\n'
          if 'ACCESS_FINE_LOCATION' not in content:
              content = content.replace('<application', perms + '    <application', 1)
          elif 'POST_NOTIFICATIONS' not in content:
              content = content.replace('<application', '    <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />\n    <application', 1)
          with open(path, 'w') as f:
              f.write(content)
          print('AndroidManifest updated')
          "

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Make gradlew executable
        working-directory: Jetlag Mobile App/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: Jetlag Mobile App/android
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: jetlag-android
          path: Jetlag Mobile App/android/app/build/outputs/apk/debug/app-debug.apk

  jetlag-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps and build web client
        working-directory: Jetlag Mobile App
        run: |
          npm install
          VITE_NATIVE_PUSH_ENABLED=true \
          VITE_SERVER_URL=https://comicsams.cloud/jetlag-api \
          VITE_WS_URL=wss://comicsams.cloud/jetlag-ws \
          npm run build

      - name: Add and sync iOS platform
        working-directory: Jetlag Mobile App
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Add location permissions to Info.plist
        working-directory: Jetlag Mobile App
        run: |
          python3 -c "
          import plistlib
          path = 'ios/App/App/Info.plist'
          with open(path, 'rb') as f:
              plist = plistlib.load(f)
          plist['NSLocationWhenInUseUsageDescription'] = 'Jetlag uses your location during the active game.'
          plist['NSLocationAlwaysAndWhenInUseUsageDescription'] = 'Jetlag uses your location during the active game, even when backgrounded.'
          modes = plist.get('UIBackgroundModes', [])
          if 'location' not in modes:
              modes.append('location')
          plist['UIBackgroundModes'] = modes
          with open(path, 'wb') as f:
              plistlib.dump(plist, f)
          print('NSLocationWhenInUseUsageDescription:', plist.get('NSLocationWhenInUseUsageDescription'))
          "

      - name: Add APNs callbacks and entitlement
        working-directory: Jetlag Mobile App
        run: |
          python3 -c "
          import plistlib
          app_delegate = 'ios/App/App/AppDelegate.swift'
          with open(app_delegate) as f:
              content = f.read()
          callbacks = '''
              func application(_ application: UIApplication, didRegisterForRemoteNotificationsWithDeviceToken deviceToken: Data) {
                  NotificationCenter.default.post(name: .capacitorDidRegisterForRemoteNotifications, object: deviceToken)
              }

              func application(_ application: UIApplication, didFailToRegisterForRemoteNotificationsWithError error: Error) {
                  NotificationCenter.default.post(name: .capacitorDidFailToRegisterForRemoteNotifications, object: error)
              }
          '''
          if 'capacitorDidRegisterForRemoteNotifications' not in content:
              content = content.rstrip().removesuffix('}') + callbacks + '\n}\n'
              with open(app_delegate, 'w') as f:
                  f.write(content)
          entitlements = {'aps-environment': 'development'}
          with open('ios/App/App/App.entitlements', 'wb') as f:
              plistlib.dump(entitlements, f)
          print('APNs callbacks and App.entitlements added')
          "

      - name: Build unsigned app
        working-directory: Jetlag Mobile App
        run: |
          set -o pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -target App \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$(pwd)/build" \
            CODE_SIGN_ENTITLEMENTS=App/App.entitlements \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee xcodebuild.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jetlag-xcodebuild-log
          path: Jetlag Mobile App/xcodebuild.log

      - name: Package as IPA
        working-directory: Jetlag Mobile App
        run: |
          mkdir Payload
          cp -r build/Release-iphoneos/App.app Payload/
          zip -r Jetlag.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: jetlag-ios
          path: Jetlag Mobile App/Jetlag.ipa
