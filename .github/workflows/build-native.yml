name: Build Native Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build web client
        working-directory: Urban Hunt
        run: |
          npm ci
          VITE_API_BASE_URL=https://comicsams.cloud/urban-hunt npm run build

      - name: Sync Capacitor to Android
        working-directory: Urban Hunt
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Make gradlew executable
        working-directory: Urban Hunt/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: Urban Hunt/android
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: urban-hunt-android
          path: Urban Hunt/android/app/build/outputs/apk/debug/app-debug.apk

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build web client
        working-directory: Urban Hunt
        run: |
          npm ci
          VITE_API_BASE_URL=https://comicsams.cloud/urban-hunt npm run build

      - name: Sync Capacitor to iOS
        working-directory: Urban Hunt
        run: npx cap sync ios

      - name: Fix Package.swift paths (Windows backslashes → forward slashes)
        working-directory: Urban Hunt
        run: |
          python3 -c "
          path = 'ios/App/CapApp-SPM/Package.swift'
          with open(path) as f:
              content = f.read()
          fixed = content.replace('\\\\', '/')
          with open(path, 'w') as f:
              f.write(fixed)
          print('Fixed Package.swift')
          "

      - name: Build unsigned app
        working-directory: Urban Hunt
        run: |
          set -o pipefail
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -target App \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$(pwd)/build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Package as IPA
        working-directory: Urban Hunt
        run: |
          mkdir Payload
          cp -r build/Release-iphoneos/App.app Payload/
          zip -r UrbanHunt.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: urban-hunt-ios
          path: Urban Hunt/UrbanHunt.ipa
