name: Build Native Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build web client
        working-directory: Urban Hunt
        run: |
          npm ci
          VITE_API_BASE_URL=https://comicsams.cloud/urban-hunt npm run build

      - name: Sync Capacitor to Android
        working-directory: Urban Hunt
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build debug APK
        working-directory: Urban Hunt/android
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: urban-hunt-android
          path: Urban Hunt/android/app/build/outputs/apk/debug/app-debug.apk

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build web client
        working-directory: Urban Hunt
        run: |
          npm ci
          VITE_API_BASE_URL=https://comicsams.cloud/urban-hunt npm run build

      - name: Sync Capacitor to iOS
        working-directory: Urban Hunt
        run: npx cap sync ios

      - name: Build unsigned archive
        working-directory: Urban Hunt
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Package as IPA
        working-directory: Urban Hunt
        run: |
          mkdir Payload
          cp -r build/App.xcarchive/Products/Applications/App.app Payload/
          cd Payload && zip -r ../UrbanHunt.ipa .

      - uses: actions/upload-artifact@v4
        with:
          name: urban-hunt-ios
          path: Urban Hunt/UrbanHunt.ipa
